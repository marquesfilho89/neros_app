services:
  postgres:
    image: postgres:16-alpine
    container_name: neros_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: neros_db
      POSTGRES_USER: ${DB_USER:-neros}
      POSTGRES_PASSWORD: ${DB_PASS:-neros_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - neros_network

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: neros_backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-neros}:${DB_PASS:-neros_secret}@postgres:5432/neros_db
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_started
    networks:
      - neros_network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: neros_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - neros_network

  nginx:
    image: nginx:alpine
    container_name: neros_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on:
      - frontend
      - backend
    networks:
      - neros_network

volumes:
  postgres_data:

networks:
  neros_network:
    driver: bridge
